<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart City - Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

/* 🌈 Animated Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#00c6ff,#0072ff,#6c5ce7,#00cec9);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 🧊 Glass Card */
.container{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    padding:35px;
    width:400px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    color:white;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:20px;
}

/* 🔄 Toggle */
.toggle{
    display:flex;
    background:rgba(255,255,255,0.15);
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
}

.toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:transparent;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.toggle button.active{
    background:white;
    color:#0072ff;
    font-weight:600;
}

/* 🧾 Input */
.input-group{
    position:relative;
    margin:12px 0;
}

.input-group input{
    width:100%;
    padding:14px 45px 14px 14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
}

.input-group label{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    font-size:13px;
    color:#ddd;
    transition:.3s;
    pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
    top:-6px;
    font-size:11px;
    color:#00cec9;
}

/* Icons */
.input-group i{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    color:#ccc;
    cursor:pointer;
}

/* 🔘 Button */
button.signup{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00cec9,#00b894);
    color:#0a0a0a;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button.signup:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* 🔗 Links */
.link{
    text-align:center;
    margin-top:12px;
    font-size:14px;
}

.link a{
    color:#00cec9;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

/* Hidden */
.hidden{
    display:none;
}

/* Error */
.error{
    background:#e74c3c;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:none;
}

/* 📱 Responsive */
@media(max-width:420px){
    .container{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2><i class="fas fa-user-plus"></i> Create Account</h2>

    <div id="errorBox" class="error"></div>

    <!-- Toggle -->
    <div class="toggle">
        <button id="emailBtn" class="active">Email</button>
        <button id="phoneBtn">Phone</button>
    </div>

    <form id="signupForm">

        <div class="input-group">
            <input type="text" id="name" required>
            <label>Full Name</label>
            <i class="fas fa-user"></i>
        </div>

        <div class="input-group" id="emailBox">
            <input type="email" id="email">
            <label>Email Address</label>
            <i class="fas fa-envelope"></i>
        </div>

        <div class="input-group hidden" id="phoneBox">
            <input type="text" id="phone">
            <label>Mobile Number</label>
            <i class="fas fa-phone"></i>
        </div>

        <div class="input-group">
            <input type="password" id="password" required>
            <label>Password</label>
            <i class="fas fa-eye" onclick="togglePassword('password')"></i>
        </div>

        <div class="input-group">
            <input type="password" id="confirmPassword" required>
            <label>Confirm Password</label>
            <i class="fas fa-eye" onclick="togglePassword('confirmPassword')"></i>
        </div>

        <button type="submit" class="signup">Sign Up</button>
    </form>

    <div class="link">
        Already have an account? <a href="userlogin.html">Login</a>
    </div>
</div>

<script>
let useEmail = true;

const emailBtn = document.getElementById("emailBtn");
const phoneBtn = document.getElementById("phoneBtn");

emailBtn.onclick = () => {
    useEmail = true;
    emailBox.classList.remove("hidden");
    phoneBox.classList.add("hidden");

    emailBtn.classList.add("active");
    phoneBtn.classList.remove("active");
};

phoneBtn.onclick = () => {
    useEmail = false;
    phoneBox.classList.remove("hidden");
    emailBox.classList.add("hidden");

    phoneBtn.classList.add("active");
    emailBtn.classList.remove("active");
};

/* 👁 Toggle Password */
function togglePassword(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

/* 🚀 Signup */
document.getElementById("signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const errorBox = document.getElementById("errorBox");
    errorBox.style.display = "none";

    const nameVal = document.getElementById("name").value.trim();
    const emailVal = document.getElementById("email").value.trim();
    const phoneVal = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        errorBox.textContent = "Passwords do not match!";
        errorBox.style.display = "block";
        return;
    }

    if(useEmail && !emailVal){
        errorBox.textContent = "Enter email!";
        errorBox.style.display = "block";
        return;
    }

    if(!useEmail && !phoneVal){
        errorBox.textContent = "Enter phone number!";
        errorBox.style.display = "block";
        return;
    }

    try{
        const response = await fetch("/api/signup",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                name: nameVal,
                email: useEmail ? emailVal : null,
                phone: !useEmail ? phoneVal : null,
                password
            })
        });

        const data = await response.json();

        if(response.ok){
            localStorage.setItem("token", data.token);
            localStorage.setItem("refreshToken", data.refreshToken);
            localStorage.setItem("user", JSON.stringify(data.user));

            alert("Signup successful!");
            window.location.href = "userdashboard.html";
        } else {
            errorBox.textContent = data.error || data.message || "Signup failed";
            errorBox.style.display = "block";
        }

    }catch(err){
        errorBox.textContent = "Server error";
        errorBox.style.display = "block";
    }
});
</script>

</body>
</html>
