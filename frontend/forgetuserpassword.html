<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart City - Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

/* 🌈 Animated Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#00c6ff,#0072ff,#6c5ce7,#00cec9);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 🧊 Glass Card */
.container{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    padding:35px;
    width:390px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    color:white;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:20px;
}

/* 🔄 Toggle */
.toggle{
    display:flex;
    background:rgba(255,255,255,0.15);
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
}

.toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:transparent;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.toggle button.active{
    background:white;
    color:#0072ff;
    font-weight:600;
}

/* 🧾 Input */
.input-group{
    position:relative;
    margin:15px 0;
}

.input-group input{
    width:100%;
    padding:14px 45px 14px 14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
}

.input-group label{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    font-size:13px;
    color:#ddd;
    transition:.3s;
    pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
    top:-6px;
    font-size:11px;
    color:#00cec9;
}

/* Icons */
.input-group i{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    color:#ccc;
}

/* 🔘 Button */
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00cec9,#00b894);
    color:#0a0a0a;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* Steps Animation */
.step{
    transition:.4s;
}

.hidden{
    display:none;
}

/* 🔗 Link */
.link{
    text-align:center;
    margin-top:12px;
    font-size:14px;
}

.link a{
    color:#00cec9;
    text-decoration:none;
}

/* 📱 Responsive */
@media(max-width:420px){
    .container{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2><i class="fas fa-key"></i> Reset Password</h2>

    <!-- Toggle -->
    <div class="toggle">
        <button id="emailBtn" class="active">Email</button>
        <button id="phoneBtn">Phone</button>
    </div>

    <!-- Step 1 -->
    <div id="step1" class="step">
        <div class="input-group" id="emailBox">
            <input type="email" id="email">
            <label>Email Address</label>
            <i class="fas fa-envelope"></i>
        </div>

        <div class="input-group hidden" id="phoneBox">
            <input type="text" id="phone">
            <label>Mobile Number</label>
            <i class="fas fa-phone"></i>
        </div>

        <button onclick="sendOTP()">Send OTP</button>
    </div>

    <!-- Step 2 -->
    <div id="step2" class="step hidden">
        <div class="input-group">
            <input type="text" id="otp">
            <label>Enter OTP</label>
            <i class="fas fa-shield-alt"></i>
        </div>

        <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <!-- Step 3 -->
    <div id="step3" class="step hidden">
        <div class="input-group">
            <input type="password" id="newPassword">
            <label>New Password</label>
            <i class="fas fa-lock"></i>
        </div>

        <div class="input-group">
            <input type="password" id="confirmPassword">
            <label>Confirm Password</label>
            <i class="fas fa-lock"></i>
        </div>

        <button onclick="resetPassword()">Reset Password</button>
    </div>

    <div class="link">
        <a href="userlogin.html">← Back to Login</a>
    </div>
</div>

<script>
let useEmail = true;
let resetEmail = '';
let resetPhone = '';

const emailBtn = document.getElementById('emailBtn');
const phoneBtn = document.getElementById('phoneBtn');

emailBtn.onclick = () => {
    useEmail = true;
    document.getElementById('emailBox').classList.remove('hidden');
    document.getElementById('phoneBox').classList.add('hidden');
    emailBtn.classList.add('active');
    phoneBtn.classList.remove('active');
};

phoneBtn.onclick = () => {
    useEmail = false;
    document.getElementById('phoneBox').classList.remove('hidden');
    document.getElementById('emailBox').classList.add('hidden');
    phoneBtn.classList.add('active');
    emailBtn.classList.remove('active');
};

async function sendOTP(){
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if(useEmail && !email){
        alert('Enter email');
        return;
    }

    if(!useEmail && !phone){
        alert('Enter phone');
        return;
    }

    const res = await fetch('/api/send-otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            email: useEmail ? email : null,
            phone: !useEmail ? phone : null
        })
    });

    const data = await res.json();
    alert(data.message || "OTP Sent");

    if(res.ok){
        resetEmail = email;
        resetPhone = phone;

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }
}

async function verifyOTP(){
    const otp = document.getElementById('otp').value;

    const res = await fetch('/api/verify-otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            email: resetEmail,
            phone: resetPhone,
            otp
        })
    });

    const data = await res.json();
    alert(data.message || "Verified");

    if(res.ok){
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }
}

async function resetPassword(){
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const otp = document.getElementById('otp').value;

    if(newPassword !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    const res = await fetch('/api/reset-password',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            email: resetEmail,
            phone: resetPhone,
            otp,
            newPassword
        })
    });

    const data = await res.json();
    alert(data.message || "Password Reset");

    if(res.ok){
        window.location.href="userlogin.html";
    }
}
</script>

</body>
</html>
